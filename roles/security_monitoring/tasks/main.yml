---
# Security Monitoring Role - Main Tasks
# Monitors systems for compliance and security issues

- name: Install monitoring tools
  ansible.builtin.apt:
    name:
      - fail2ban
      - ufw
      - aide
      - rkhunter
      - logwatch
    state: present
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Configure UFW firewall
  community.general.ufw:
    state: enabled
    policy: deny
  when: ufw_enabled | default(true)

- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow additional services
  community.general.ufw:
    rule: allow
    name: "{{ item }}"
  loop: "{{ allowed_services | default([]) }}"
  when: allowed_services is defined

- name: Configure fail2ban
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = {{ fail2ban_max_retry | default(5) }}
      
      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban
  when: fail2ban_enabled | default(true)

- name: Start and enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: yes
  when: fail2ban_enabled | default(true)

- name: Check for unauthorized users
  ansible.builtin.shell: |
    awk -F: '$3 >= 1000 && $3 < 65534 {print $1}' /etc/passwd
  register: system_users
  changed_when: false

- name: Log system users
  ansible.builtin.debug:
    msg: "Current users on {{ inventory_hostname }}: {{ system_users.stdout_lines }}"
