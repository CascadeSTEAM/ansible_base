[defaults]
# Inventory configuration
inventory = ./inventory
host_key_checking = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 86400

# SSH configuration
remote_user = ansible
private_key_file = ~/.ssh/id_rsa
timeout = 30

# Privilege escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Logging
log_path = ./ansible.log

# Performance
forks = 10
poll_interval = 15

# Plugin paths
inventory_plugins = ./inventory/dynamic
roles_path = ./roles

# Display settings
display_skipped_hosts = False
display_args_to_stdout = False
nocows = 1

[inventory]
# Enable inventory plugins
enable_plugins = nmap, constructed, ini, yaml, host_list, auto

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
